<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Networks - Learning Hub</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 1.8rem;
    }

    header p {
      margin: 0;
      opacity: 0.9;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 106px);
    }

    nav {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    nav h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .menu-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .menu-btn:hover { border-color: #bfdbfe; }

    .menu-btn.active {
      background: var(--primary-soft);
      border-color: #93c5fd;
      color: #1e3a8a;
      font-weight: 600;
    }

    main {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .content-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .content-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .mobile-menu {
      display: none;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 220px);
      border: none;
      background: #fff;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      nav {
        display: none;
      }

      .mobile-menu {
        display: inline-block;
        min-width: 260px;
        max-width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      iframe {
        height: calc(100vh - 250px);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Computer Networks Learning Hub</h1>
    <p>Unified navigation for all chapters</p>
  </header>

  <div class="layout">
    <nav aria-label="Main chapters">
      <h2>Chapters</h2>
      <button class="menu-btn active" data-file="1.html" data-title="1. Basics of Computer Network">1. Basics of Computer Network</button>
      <button class="menu-btn" data-file="2.html" data-title="2. Transmission Media">2. Transmission Media</button>
      <button class="menu-btn" data-file="3.html" data-title="3. Network Layer">3. Network Layer</button>
      <button class="menu-btn" data-file="4.html" data-title="4. Transport Layer">4. Transport Layer</button>
      <button class="menu-btn" data-file="5.html" data-title="5. Network Devices and Their Protocols">5. Network Devices and Their Protocols</button>
    </nav>

    <main>
      <div class="content-head">
        <h2 id="current-title">1. Basics of Computer Network</h2>
        <select class="mobile-menu" id="mobile-menu" aria-label="Select chapter">
          <option value="1.html" selected>1. Basics of Computer Network</option>
          <option value="2.html">2. Transmission Media</option>
          <option value="3.html">3. Network Layer</option>
          <option value="4.html">4. Transport Layer</option>
          <option value="5.html">5. Network Devices and Their Protocols</option>
        </select>
      </div>
      <iframe id="content-frame" title="Chapter content" src="1.html"></iframe>
    </main>
  </div>

  <script>
    const buttons = Array.from(document.querySelectorAll('.menu-btn'));
    const frame = document.getElementById('content-frame');
    const title = document.getElementById('current-title');
    const mobileMenu = document.getElementById('mobile-menu');

    function setActive(file) {
      buttons.forEach((btn) => {
        const active = btn.dataset.file === file;
        btn.classList.toggle('active', active);
        if (active) title.textContent = btn.dataset.title;
      });
      mobileMenu.value = file;
      frame.src = file;
    }

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => setActive(btn.dataset.file));
    });

    mobileMenu.addEventListener('change', (event) => {
      setActive(event.target.value);
    });
  </script>
</body>
</html>
